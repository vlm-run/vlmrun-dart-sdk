name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - next

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6.0"

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Pub score (pana)
        run: |
          dart pub global activate pana
          dart pub global run pana . --no-warning || true

  build:
    name: build
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6.0"

      - name: Install dependencies
        run: dart pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify no changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated files are out of date. Please run 'dart run build_runner build' and commit the changes."
            git diff
            exit 1
          fi

  test:
    name: test
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6.0"

      - name: Install dependencies
        run: dart pub get

      - name: Run tests
        run: dart test
